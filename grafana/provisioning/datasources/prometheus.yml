# Grafana Datasource Provisioning
#
# "Provisioning" means Grafana reads this file on startup and automatically
# configures the datasource — no manual UI clicks required. This is
# "observability as code": the datasource config lives in version control
# alongside the rest of the stack.
#
# Without provisioning, you'd log in to Grafana, go to
# Configuration → Data Sources → Add, fill out the form, and click Save.
# That config lives inside the grafana_data Docker volume and is invisible
# to anyone reading the repo. Provisioning makes it explicit and reproducible.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # uid is a stable identifier we use in dashboard JSON to reference this
    # datasource. If we used the auto-generated ID, it would change on every
    # fresh Grafana install and break all dashboard queries.
    uid: prometheus-local
    url: http://prometheus:9090  # internal Docker DNS — Grafana talks to Prometheus on the Docker network
    access: proxy                # "proxy" = Grafana backend makes the request (not your browser)
    isDefault: true              # pre-selected when adding new panels
    jsonData:
      # Tell Grafana the scrape interval so it aligns its step calculations.
      # Must match global.scrape_interval in prometheus.yml.
      # If mismatched, you'll see "Expected X got Y" resolution warnings in panels.
      timeInterval: "15s"
      exemplarTraceIdDest:
        datasourceUid: tempo-local
        name: trace_id

  # ─────────────────────────────────────────────────────────────────
  # Loki datasource
  #
  # Loki is queried using LogQL — a query language that looks like PromQL
  # but operates on log streams instead of time-series metrics.
  #
  # Basic LogQL anatomy:
  #   {service_name="nestjs-app"}              → stream selector (label filter)
  #   {service_name="nestjs-app"} |= "ERROR"  → + content filter (slower scan)
  #   rate({level="ERROR"}[1m])               → metric query over log counts
  #
  # uid: "loki-local" — we set a stable uid so we can later use it in
  # Grafana panel JSON to create Loki → Tempo trace correlation links.
  # ─────────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki-local
    url: http://loki:3100         # Internal Docker DNS
    access: proxy
    isDefault: false
    jsonData:
      maxLines: 1000              # Max log lines returned per query in Explore.
                                  # Increase if you need more history per query.
      derivedFields:
        - datasourceUid: tempo-local
          # Match 32-char hex trace IDs from either key=value or JSON-style logs.
          matcherRegex: "(?:trace_id|traceID|traceid)\\\"?[:=]\\\"?([0-9a-fA-F]{32})"
          name: TraceID
          url: "$${__value.raw}"

  # ─────────────────────────────────────────────────────────────────
  # Tempo datasource — distributed trace backend
  #
  # Grafana queries Tempo by trace ID. The typical flow is:
  #   1. You see a log line in Loki Explore containing a traceID field.
  #   2. You click the trace ID → Grafana sends GET /api/traces/{traceID} to Tempo.
  #   3. Tempo returns the full span tree → Grafana renders the waterfall.
  #
  # Loki and Prometheus are wired to this datasource so click-through
  # correlation (logs/metrics → trace) works in Grafana Explore.
  #
  # uid: "tempo-local" — we set a stable uid so Loki and Prometheus datasource
  # configs can reference it by ID when we add correlation links next.
  # ─────────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo-local
    url: http://tempo:3200   # Tempo HTTP API — internal Docker DNS
    access: proxy
    isDefault: false
