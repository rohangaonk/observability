services:
  # ─────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector
  # Role: receives telemetry from the NestJS app via OTLP,
  #       processes it (batching, memory limiting),
  #       and exports it to backends (currently: debug/console).
  #
  # Image: otel/opentelemetry-collector-contrib
  #   "contrib" = the community distribution that includes extra receivers,
  #   processors, and exporters beyond the core image. We'll need the
  #   Kafka exporter and other backend exporters — many are contrib-only.
  # ─────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: otel-collector
    # Mount our pipeline config into the container.
    # The --config flag tells the Collector where to find it.
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver  — used by gRPC-based SDKs
      - "4318:4318"   # OTLP HTTP receiver  — used by our NestJS app
      - "13133:13133" # Health check endpoint — GET /health returns 200 when ready
      - "8889:8889"   # Prometheus scrape endpoint — GET /metrics in Prometheus text format
    # NOTE: The otel-collector-contrib image is fully distroless — no shell, no curl,
    # no wget. A CMD-based healthcheck is not possible in this image.
    # Prometheus handles a temporarily unavailable scrape target gracefully by
    # retrying on each scrape interval, so no healthcheck is needed here.
    depends_on:
      loki:
        condition: service_healthy  # Wait for Loki to be ready before pushing logs to it
      tempo:
        condition: service_healthy  # Wait for Tempo to be ready before the Collector forwards traces to it
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Apache Kafka (KRaft mode)
  # Role: Message broker to decouple telemetry ingestion from processing.
  #       The OTel Collector will push data here instead of directly to storage.
  #
  # We're using KRaft (Kafka Raft) mode, which eliminates the need for
  # a separate ZooKeeper container to manage metadata.
  # ─────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Kafka UI
  # Role: A web interface to inspect Kafka topics and messages.
  #       We will use this to verify telemetry data is flowing correctly.
  # ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:master
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      # Connect the UI to our Kafka broker using the internal Docker network
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Apache Flink JobManager
  # Role: The coordinator/master node for the Flink cluster.
  #       Accepts Flink jobs, schedules tasks, and coordinates checkpoints.
  # ─────────────────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink-jobs
    image: flink-py:latest
    container_name: flink-jobmanager
    ports:
      - "8082:8081" # Flink Web UI - use this to monitor jobs and task managers
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink-jobs:/opt/flink/usrlib
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Apache Flink TaskManager
  # Role: The worker node that actually executes the stream processing tasks.
  #       You can scale these up to process higher volumes of data.
  # ─────────────────────────────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./flink-jobs
    image: flink-py:latest
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./flink-jobs:/opt/flink/usrlib
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Grafana Tempo — distributed trace storage
  # Role: receives OTLP spans from the OTel Collector and stores them
  #       as compressed trace blocks on disk.
  #
  # Tempo stores trace data as compressed blocks and is queried by Grafana.
  # In this stack, Tempo is the single trace backend used for correlation.
  # ─────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml       # Our pipeline config
      - tempo_data:/var/tempo                      # Persistent trace + WAL storage
    ports:
      - "3200:3200"  # Tempo HTTP API — Grafana queries traces here
      # Ports 4317/4318 are NOT exposed on the host — only the OTel Collector
      # (inside Docker) talks to Tempo on those ports via Docker DNS (tempo:4317).
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Grafana Loki — log aggregation and storage
  # Role: receives logs from the OTel Collector and stores them as
  #       compressed chunks indexed by labels (not by log content).
  #
  # Key concept: Loki is intentionally "dumb" about log content.
  # It indexes ONLY the labels you attach (e.g. service_name, severity).
  # The raw log body is compressed and stored cheaply. This makes Loki
  # orders of magnitude cheaper than Elasticsearch at scale.
  #
  # The OTel Collector's loki exporter pushes logs via HTTP to:
  #   http://loki:3100/loki/api/v1/push
  # ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    user: "0"         # Run as root so Loki can create /var/loki/chunks and /var/loki/rules
                      # on the Docker named volume (which is initially root-owned).
                      # This is standard for local dev — production Loki uses object storage
                      # (S3/GCS) so filesystem permissions are not a concern there.
    ports:
      - "3100:3100"  # Loki HTTP API — push endpoint and query API
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml  # Mount our config
      - loki_data:/var/loki                              # Persistent chunk + index storage
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Prometheus — time-series metrics storage + scraper
  # Role: periodically pulls metrics from the OTel Collector's /metrics
  #       endpoint and stores them as time-series data in its built-in TSDB.
  #
  # This is the critical concept to internalize: Prometheus is PULL-based.
  # It controls WHEN and HOW OFTEN data is collected (via scrape_interval).
  # The OTel Collector's prometheus exporter just holds that data ready.
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"  # Prometheus UI and HTTP API — open this to query metrics directly
    volumes:
      # Mount our scrape config. This is the only required config for Prometheus.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Named volume for persistent storage — metrics survive container restarts.
      # Without this, every restart loses all historical data.
      - prometheus_data:/prometheus
    command:
      # Tell Prometheus where to find its config (our mounted file)
      - "--config.file=/etc/prometheus/prometheus.yml"
      # How long to retain data. 15 days is fine for local dev.
      - "--storage.tsdb.retention.time=15d"
      # Enable the remote-write receiver API (useful to understand the push vs pull options)
      - "--web.enable-remote-write-receiver"
    depends_on:
      otel-collector:
        condition: service_started  # Collector starts immediately; Prometheus will retry failed scrapes
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Grafana — visualization and dashboarding
  # Role: queries Prometheus (and other data sources) via PromQL and
  #       renders interactive dashboards.
  #
  # Grafana itself stores NO metric data. It's a pure query + render layer.
  # Every panel on a dashboard is just a PromQL query executed against
  # Prometheus at render time. This separation is intentional:
  #   - Change your storage backend → only update the datasource
  #   - Dashboards remain unchanged
  # ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"  # Grafana UI — host:3001 → container:3000 (3000 is reserved for the NestJS app)
    environment:
      # Default admin credentials for local dev.
      # In production these would come from secrets, not env vars.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Disable the signup page — not needed locally
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Persistent storage for dashboards, data source configs, and settings.
      # Without this, every Grafana restart loses all your configured dashboards.
      - grafana_data:/var/lib/grafana
      # Provisioning: Grafana reads this directory on startup to auto-configure
      # datasources and dashboard providers — no manual UI setup required.
      # The subdirectory name (datasources/, dashboards/) is significant:
      # Grafana routes each subfolder to the corresponding provisioning type.
      - ./grafana/provisioning:/etc/grafana/provisioning
      # The actual dashboard JSON files. The path here must match the
      # 'path' field in grafana/provisioning/dashboards/dashboards.yml.
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki        # Wait for Loki to start so the datasource connection check succeeds on first boot
      - tempo       # Wait for Tempo so the trace datasource is reachable on first boot
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────
# Named volumes
# Docker manages these on disk outside the project folder.
# Declaring them here makes them shareable across services and
# survives `docker compose down` (but NOT `docker compose down -v`).
# ─────────────────────────────────────────────────────────────────
volumes:
  prometheus_data: {}  # Stores Prometheus time-series data across restarts
  grafana_data: {}     # Stores Grafana dashboards, datasource configs, and settings
  loki_data: {}        # Stores Loki compressed log chunks and index files
  tempo_data: {}       # Stores Tempo raw trace blocks and WAL
