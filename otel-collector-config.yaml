receivers:
  # The OTLP receiver is the standard way for OTel-instrumented apps to push
  # telemetry INTO the Collector. It speaks the OpenTelemetry Protocol (OTLP).
  #
  # Two transports are supported — we enable both:
  #   - grpc: port 4317  (binary, efficient, used by most SDKs by default)
  #   - http: port 4318  (JSON over HTTP, easier to debug with curl)
  #
  # Our NestJS app uses OTLP/HTTP (OTLPTraceExporter with a URL), so port 4318
  # is the one that matters here. We keep gRPC available for future tools.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # Listen on all interfaces inside the container
      http:
        endpoint: 0.0.0.0:4318

processors:
  # The batch processor is almost always the first processor you add.
  # Instead of forwarding each span individually (expensive), it accumulates
  # spans and sends them in batches.
  #
  # send_batch_size: flush when the buffer hits 512 spans
  # timeout: flush every 5s even if the batch isn't full yet
  #          (prevents spans being stuck in the buffer during low traffic)
  batch:
    send_batch_size: 512
    timeout: 5s

  # memory_limiter prevents the Collector from consuming unbounded memory
  # if a backend is slow or downstream is overwhelmed.
  # It checks memory every second and drops new data if over 400MiB.
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # The debug exporter prints received telemetry to the Collector's stdout.
  # verbosity: detailed → prints the full span/metric/log body.
  #
  # This is the MOST IMPORTANT exporter for learning. Before you trust that
  # data is flowing, you verify it here. It's the Collector's console.log.
  #
  # In later phases we'll add:
  #   - otlp/jaeger exporter  → sends traces to Jaeger
  #   - kafka exporter        → sends to Kafka topic
  debug:
    verbosity: detailed

  # The otlp exporter sends data OUT of the Collector using the OTLP protocol.
  # We name it "otlp/jaeger" (the "/jaeger" suffix is just a label — you can
  # have multiple otlp exporters with different names and configs).
  #
  # endpoint: jaeger:4317
  #   "jaeger" resolves to the Jaeger container via Docker's internal DNS.
  #   Port 4317 = Jaeger's OTLP/gRPC receiver (enabled by COLLECTOR_OTLP_ENABLED=true).
  #   gRPC is preferred here: it's binary, more efficient than HTTP/JSON for
  #   collector-to-collector hops inside a Docker network.
  #
  # tls.insecure: true — no TLS certificates needed for local Docker networking.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # The kafka exporter sends data to a Kafka topic.
  # We define two separate instances: one for metrics, one for logs.
  kafka/metrics:
    # broker list (using the internal Docker network name)
    brokers:
      - kafka:29092
    protocol_version: 2.0.0
    # The topic to publish to.
    topic: telemetry.metrics
    encoding: otlp_json

  kafka/logs:
    brokers:
      - kafka:29092
    protocol_version: 2.0.0
    # The topic to publish to.
    topic: telemetry.logs
    encoding: otlp_json

  # Since Loki 3.0, Loki has a native OTLP ingestion endpoint.
  # This means we don't need a special "loki" exporter at all —
  # we just use the standard otlphttp exporter pointed at Loki's OTLP path.
  #
  # How it works:
  #   The otlphttp exporter sends logs (and only logs, because this exporter
  #   is only used in the logs pipeline below) to Loki's OTLP endpoint.
  #   The Collector appends "/v1/logs" to the endpoint automatically.
  #   So the full URL becomes: http://loki:3100/otlp/v1/logs
  #
  # Loki then converts the OTLP log records using its built-in attribute mapping:
  #   - "service.name" resource attribute → {service_name="..."} label
  #   - "deployment.environment" → {deployment_environment="..."} label
  #   - Everything else → stored as structured metadata (not indexed)
  #
  # This is the recommended approach as of Loki 3.x. The old "loki" exporter
  # (which did the conversion inside the Collector) is deprecated.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true  # No TLS needed for internal Docker network communication

  # The otlp/tempo exporter forwards spans to Grafana Tempo.
  # We name it "otlp/tempo" to distinguish it from the Jaeger exporter above.
  # Both Jaeger and Tempo receive the same trace data simultaneously — this lets
  # us compare them side by side while we transition. In Phase 7 step 3 we'll
  # remove Jaeger once Tempo is confirmed working with Grafana correlation.
  otlp/tempo:
    endpoint: tempo:4317   # tempo = Docker container name; 4317 = Tempo's gRPC OTLP receiver
    tls:
      insecure: true       # No TLS needed on the internal Docker network

  # The prometheus exporter turns the Collector into a Prometheus scrape target.
  # Instead of PUSHING metrics somewhere, it EXPOSES them at an HTTP endpoint.
  # Prometheus will periodically GET http://otel-collector:8889/metrics and pull
  # the data itself. This is the "bridge" from OTel's push model to Prometheus'
  # pull model — no code changes needed in the NestJS app.
  #
  # namespace: adds a prefix to every metric name (e.g. "otel_process_up").
  # This helps distinguish OTel-sourced metrics in Prometheus from other sources.
  prometheus:
    endpoint: "0.0.0.0:8889"   # Prometheus will scrape this endpoint
    namespace: otel             # Prefix all metric names with "otel_"

extensions:
  # The health_check extension exposes a /health endpoint on port 13133.
  # Used by Docker's healthcheck to know when the Collector is ready.
  health_check:
    endpoint: 0.0.0.0:13133

service:
  # Extensions must be listed here to be activated
  extensions: [health_check]

  # Pipelines wire receivers → processors → exporters together.
  # You can have separate pipelines for traces, metrics, and logs —
  # each can route to different exporters independently.
  pipelines:
    # Traces pipeline: receives OTLP spans → batches them → sends to BOTH:
    #   1. debug   → Collector stdout (so we can still see raw span data in logs)
    #   2. jaeger  → Jaeger for visual exploration in the UI
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      # Traces now go to both Jaeger and Tempo simultaneously.
      # Why keep both? Jaeger is already working and trusted. Tempo is new.
      # Running them in parallel lets you verify Tempo works before removing Jaeger.
      exporters: [debug, otlp/jaeger, otlp/tempo]

    # Metrics pipeline: receives OTLP metrics → batches them → sends to BOTH:
    #   1. kafka/metrics → Kafka topic for Flink stream processing
    #   2. prometheus    → HTTP endpoint for Prometheus to scrape
    # Having two exporters here means the same data goes to both sinks
    # simultaneously — Kafka for real-time alerting via Flink, and
    # Prometheus for persistent storage and Grafana dashboards.
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/metrics, prometheus]
      
    # Logs pipeline: receives OTLP logs → batches them → sends to TWO sinks:
    #   1. kafka/logs      → Kafka topic (for Flink stream processing)
    #   2. otlphttp/loki   → Loki's native OTLP endpoint (for persistent log storage)
    #
    # Both exporters receive the identical log stream simultaneously.
    # Kafka is the real-time processing path (Flink reads from it).
    # Loki is the storage/query path (Grafana reads from it).
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/logs, otlphttp/loki]
